<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>تطبيق عنايتي | My DermaCare</title>
  <!-- Font Awesome 6 for sharp, clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Tajawal', system-ui, -apple-system, sans-serif;
      background: #f4f7fc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.2rem;
      margin: 0;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      background: #ffffff;
      border-radius: 2.8rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.06), 0 10px 25px rgba(0,20,30,0.08);
      padding: 1.8rem 1.5rem 2rem;
      border: 1px solid rgba(209, 222, 235, 0.5);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #0b3b4f;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
      border-bottom: 1px solid #dce8f0;
      padding-bottom: 0.7rem;
    }
    h1 i {
      color: #1e7e83;
      font-size: 2rem;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      justify-items: center;
      align-items: start;
    }

    .icon-card {
      background: #ffffff;
      border-radius: 1.8rem;
      padding: 1.2rem 0.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.02), 0 2px 6px rgba(46, 65, 86, 0.06);
      transition: all 0.2s ease;
      border: 1px solid #edf2f9;
      cursor: pointer;
      width: 100%;
      aspect-ratio: 1/0.95;
      gap: 0.4rem;
    }

    .icon-card i {
      font-size: 2.2rem;
      color: #1b5e6b;
      background: #e3f2f7;
      padding: 0.7rem;
      border-radius: 50%;
      width: 3.4rem;
      height: 3.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .icon-card span {
      font-weight: 600;
      font-size: 0.84rem;
      color: #1e2f3a;
      line-height: 1.3;
      margin-top: 0.2rem;
    }

    .icon-card:hover {
      transform: translateY(-3px);
      background: #fafeff;
      border-color: #b8d8e3;
      box-shadow: 0 16px 24px rgba(19, 105, 115, 0.08);
    }

    .icon-card:hover i {
      background: #cce8f0;
      color: #0b4149;
    }

    .special-card {
      background: linear-gradient(135deg, #f0f7fa, #ffffff);
      border: 1px solid #cde3ed;
    }

    /* Modal / Sheet display */
    .routine-panel {
      background: #ffffff;
      border-radius: 2rem 2rem 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.08);
      padding: 1.8rem 1.5rem;
      margin-top: 0.8rem;
      border: 1px solid #eaf0f6;
      display: none;
      transition: 0.2s;
    }

    .routine-panel.active {
      display: block;
    }

    .routine-title {
      font-weight: 700;
      font-size: 1.3rem;
      color: #003543;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .step-item {
      background: #f6fafd;
      padding: 0.9rem 1rem;
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 500;
      color: #14323e;
      border: 1px solid #dde9f1;
      font-size: 0.96rem;
    }

    .step-item i {
      color: #1e7e83;
      width: 1.5rem;
      text-align: center;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #6f8b99;
      cursor: pointer;
      float: left;
      margin-top: -0.3rem;
    }

    hr {
      border: 0.5px solid #d6e3ec;
      margin: 1rem 0 0.8rem;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #768e9c;
      text-align: center;
      margin-top: 0.8rem;
    }

    @media (max-width: 400px) {
      .dashboard-grid {
        gap: 0.8rem;
      }
      .icon-card i {
        font-size: 1.8rem;
        width: 2.8rem;
        height: 2.8rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    <i class="fas fa-seedling"></i> 
    عنايتي الجلدية
  </h1>

  <!-- أيقونات الروتين -->
  <div class="dashboard-grid" id="iconGrid">
    <!-- صباح -->
    <div class="icon-card" data-routine="morning">
      <i class="fas fa-sun"></i>
      <span>☀️ صباح</span>
    </div>
    <!-- مساء -->
    <div class="icon-card" data-routine="evening">
      <i class="fas fa-moon"></i>
      <span>🌙 مساء</span>
    </div>
    <!-- بعد الوضوء -->
    <div class="icon-card" data-routine="wudu">
      <i class="fas fa-hand-holding-water"></i>
      <span>💧 بعد الوضوء</span>
    </div>
    <!-- بعد الاغتسال -->
    <div class="icon-card" data-routine="ghusl">
      <i class="fas fa-shower"></i>
      <span>🛁 اغتسال</span>
    </div>
    <!-- قبل الدوام -->
    <div class="icon-card special-card" data-routine="preWork">
      <i class="fas fa-briefcase"></i>
      <span>🏢 قبل الدوام</span>
    </div>
    <!-- بعد العودة من الدوام -->
    <div class="icon-card special-card" data-routine="postWork">
      <i class="fas fa-home"></i>
      <span>🏠 بعد الدوام</span>
    </div>
    <!-- سلة التسوق -->
    <div class="icon-card" data-routine="shopping">
      <i class="fas fa-cart-shopping"></i>
      <span>🛒 سلة الشراء</span>
    </div>
    <!-- جدول الأيام (أوف/دوام) -->
    <div class="icon-card" data-routine="schedule">
      <i class="fas fa-calendar-alt"></i>
      <span>📅 جدول الأيام</span>
    </div>
    <!-- نصائص التعارض -->
    <div class="icon-card" data-routine="conflicts">
      <i class="fas fa-shield-alt"></i>
      <span>⚠️ نصائص التعارض</span>
    </div>
  </div>

  <!-- لوحة عرض التفاصيل -->
  <div id="routineDisplay" class="routine-panel">
    <button class="close-btn" id="closePanel"><i class="fas fa-times"></i></button>
    <div id="routineContent"></div>
  </div>
  <div class="footer-note">روتين متكامل · خبير جلدي وتقني</div>
</div>

<script>
  (function() {
    // ----- قائمة المنتجات الكاملة (للإشارة) -----
    const PRODUCT_LIST = [
      "CeraVe Foaming Cleanser", "Genove Champu Anticaida", "MORFOSE Keratin Serum",
      "Deepdown Percos Technique Cream & Hair Treatment", "Morfose Dairy Milk Care Serum",
      "Mainimoto Accelerator II Upgrade Hair Serum", "Pure Beauty Hair Serum Deep Care",
      "CeraVe Moisturizing Cream", "Hydrosil Boost Night Cream", "Nivea Soft Moisturizing Cream SPF 15",
      "Neutrogena Boost Water in Milk", "Vaseline Verbena Glycerin Cream", "Nivea Non-Greasy Hydrating Lotion",
      "La Roche-Posay Retinol B3 Serum", "The Ordinary AHA 30% + BHA 2% Peeling Solution",
      "The Ordinary Niacinamide 10% + Zinc 1%", "Revox Just Niacinamide 10% Daily Moisturiser",
      "La Roche-Posay Mela B3 Serum", "Vaseline Glutaglow Ampoule", "The Ordinary Hyaluronic Acid 2% + B5",
      "Eucerin Sun Protection SPF 50+", "Nivea Sun Fluid", "Genove Crema Facial +50 FPS",
      "SARA Anti-Wrinkle Eye Cream"
    ];

    // ----- الروتينات المفصلة حسب الأيقونات -----
    const routines = {
      morning: {
        title: "☀️ روتين الصباح (قبل الخروج)",
        steps: [
          { icon: "fa-hand-sparkles", text: "غسل الوجه بـ CeraVe Foaming Cleanser" },
          { icon: "fa-eye", text: "كريم العين SARA Anti-Wrinkle Eye Cream (تربيت خفيف)" },
          { icon: "fa-droplet", text: "سيروم The Ordinary Hyaluronic Acid 2% + B5 (وجه رطب)" },
          { icon: "fa-sun", text: "مرطب نهاري: Revox Niacinamide 10% Moisturiser أو Neutrogena Water in Milk" },
          { icon: "fa-shield", text: "واقي شمس: Eucerin SPF50+ أو Genove Facial +50 FPS" },
          { icon: "fa-music", text: "للشعر: سيروم Morfose Milk Serum أو Pure Beauty (الأطراف)" }
        ]
      },
      evening: {
        title: "🌙 روتين المساء (قبل النوم)",
        steps: [
          { icon: "fa-soap", text: "تنظيف مزدوج: إزالة المكياج/الواقي ثم CeraVe Cleanser" },
          { icon: "fa-eye", text: "كريم SARA للعين" },
          { icon: "fa-fire", text: "حسب اليوم: إما La Roche-Posay Retinol B3 أو The Ordinary Peeling (يومين منفصلين)" },
          { icon: "fa-droplet", text: "سيروم مرطب: Hyaluronic Acid أو Mela B3 (إذا لا تستخدم ريتينول)" },
          { icon: "fa-cube", text: "كريم ليلي: Hydrosil Boost أو CeraVe Moisturizing Cream" }
        ]
      },
      wudu: {
        title: "💧 بعد الوضوء",
        steps: [
          { icon: "fa-hand-holding-droplet", text: "ترطيب فوري: The Ordinary Hyaluronic Acid 2% + B5 على بشرة ندية" },
          { icon: "fa-smile", text: "طبقة خفيفة من CeraVe Moisturizing Cream أو Neutrogena Water Milk" },
          { icon: "fa-shield-alt", text: "إذا كان نهاراً: تجديد واقي شمس Eucerin/Genove على الوجه واليدين" }
        ]
      },
      ghusl: {
        title: "🛁 بعد الاغتسال",
        steps: [
          { icon: "fa-shower", text: "تنظيف الجسم: CeraVe Cleanser أو غسول لطيف" },
          { icon: "fa-hand-holding-heart", text: "ترطيب الجسم: Nivea Non-Greasy Lotion أو Vaseline Glycerin Cream" },
          { icon: "fa-seedling", text: "للشعر: Genove Champu Anticaida ثم Deepdown Percos Treatment" },
          { icon: "fa-wind", text: "سيروم الشعر: Morfose Keratin أو Mainimoto Accelerator" },
          { icon: "fa-face-smile", text: "الوجه: روتين مختصر (سيروم + مرطب) حسب الوقت" }
        ]
      },
      preWork: {
        title: "🏢 قبل الدوام",
        steps: [
          { icon: "fa-sun", text: "روتين صباحي كامل (غسول، سيروم، مرطب، واقي شمس)" },
          { icon: "fa-eye", text: "كريم SARA حول العين" },
          { icon: "fa-wind", text: "سيروم شعر سريع (Morfose Dairy Milk) للأطراف" },
          { icon: "fa-bolt", text: "واقي شمس Eucerin/Genove +50 على الوجه والرقبة واليدين" },
          { icon: "fa-clock", text: "لا تستخدم مقشرات أو ريتينول صباحاً" }
        ]
      },
      postWork: {
        title: "🏠 بعد العودة من الدوام",
        steps: [
          { icon: "fa-soap", text: "غسل الوجه بلطف CeraVe Cleanser لإزالة العرق والواقي" },
          { icon: "fa-droplet", text: "ترطيب مباشر: The Ordinary Hyaluronic Acid + B5" },
          { icon: "fa-cube", text: "مرطب خفيف: Neutrogena Water in Milk أو Nivea Soft" },
          { icon: "fa-spa", text: "إذا كانت ليلة تقشير/ريتينول: تجهيز البشرة بمرطب ثم التطبيق ليلاً" }
        ]
      },
      shopping: {
        title: "🛒 سلة إعادة الشراء",
        steps: [
          { icon: "fa-cart-plus", text: "CeraVe Foaming Cleanser & Moisturizing Cream" },
          { icon: "fa-cart-plus", text: "La Roche-Posay Retinol B3 & Mela B3 Serum" },
          { icon: "fa-cart-plus", text: "The Ordinary Peeling, Niacinamide, Hyaluronic Acid" },
          { icon: "fa-cart-plus", text: "Eucerin SPF50+ / Genove Facial +50" },
          { icon: "fa-cart-plus", text: "SARA Eye Cream, Vaseline Glutaglow Ampoule" },
          { icon: "fa-cart-plus", text: "منتجات الشعر: Genove Shampoo, Morfose keratin/milk, Pure Beauty, Mainimoto" }
        ]
      },
      schedule: {
        title: "📅 أيام الدوام × أوف",
        steps: [
          { icon: "fa-calendar-check", text: "أيام الدوام: روتين PreWork + PostWork، وتطبيق خفيف نهاراً" },
          { icon: "fa-calendar-day", text: "أيام الأوف: مثالية لاستخدام The Ordinary Peeling (ليلية الثلاثاء/الجمعة)" },
          { icon: "fa-calendar-plus", text: "ليالي الريتينول: الأحد والإثنين والخميس (مساءً فقط)" },
          { icon: "fa-clock", text: "تأكد من الفصل 24 ساعة بين الريتينول والمقشرات" }
        ]
      },
      conflicts: {
        title: "⚠️ نصائح ذهبية لتجنب التعارض",
        steps: [
          { icon: "fa-ban", text: "لا تجمع: ريتينول + AHA/BHA Peeling في نفس الليلة" },
          { icon: "fa-ban", text: "فيتامين C (نقي) مع Niacinamide عالي التركيز معاً = تهيّج" },
          { icon: "fa-check-circle", text: "الآمن: Hyaluronic Acid و CeraVe مرطب مع أي منتج" },
          { icon: "fa-shield", text: "دائماً واقي شمس صباحاً بعد الريتينول/التقشير" },
          { icon: "fa-eye", text: "كريم العين SARA يحمي محيط العين قبل السيرومات القوية" }
        ]
      }
    };

    const displayPanel = document.getElementById('routineDisplay');
    const routineContent = document.getElementById('routineContent');
    const closePanel = document.getElementById('closePanel');
    const iconGrid = document.getElementById('iconGrid');

    function renderRoutine(routineKey) {
      const routine = routines[routineKey];
      if (!routine) return;

      let html = `<div class="routine-title"><i class="fas fa-clipboard-list"></i> ${routine.title}</div>`;
      html += '<ul class="step-list">';
      routine.steps.forEach(step => {
        html += `<li class="step-item"><i class="fas ${step.icon}"></i> ${step.text}</li>`;
      });
      html += '</ul>';
      html += '<hr><div style="font-size:0.8rem; color:#4a6875;">⚕️ مبني على توصيات جلدية</div>';
      routineContent.innerHTML = html;
      displayPanel.classList.add('active');
    }

    iconGrid.addEventListener('click', (e) => {
      const card = e.target.closest('.icon-card');
      if (!card) return;
      const routineKey = card.dataset.routine;
      if (routineKey) {
        renderRoutine(routineKey);
      }
    });

    closePanel.addEventListener('click', () => {
      displayPanel.classList.remove('active');
    });

    // إخفاء اللوحة عند النقر خارجها (اختياري)
    document.addEventListener('click', function(event) {
      if (!displayPanel.contains(event.target) && !event.target.closest('.icon-card')) {
        displayPanel.classList.remove('active');
      }
    });

  })();
</script>
</body>
</html>
